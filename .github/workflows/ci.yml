name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env
      - name: Install dependencies
        run: |
          for service in gateway users_service transactions_service purposes_service \
            notification_service history_service images_service pseudo_bank_service; do
            pip install -r $service/requirements.txt
          done
      - name: Run tests
        run: make test
