name: E2E Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Create env files from secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.ENV_TEST_FILE }}" > .env.test
      - name: Build test stack
        run: docker compose -f docker-compose.test.yml -p smartbudget-test build
      - name: Start test stack
        run: make test-e2e-start
      - name: Run E2E tests
        run: make test-e2e
      - name: Stop test stack
        if: always()
        run: make test-e2e-stop
